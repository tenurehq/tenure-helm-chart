{{- if and (eq .Values.mode "bundled") .Values.database.bundled.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tenure.fullname" . }}-mongo
spec:
  serviceName: {{ include "tenure.fullname" . }}-mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mongo
      {{- include "tenure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mongo
        {{- include "tenure.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.database.bundled.image.repository }}:{{ .Values.database.bundled.image.tag }}"
          ports:
            - containerPort: 27017
          env:
            - name: MONGODB_INITDB_ROOT_USERNAME
              value: tenure
            - name: MONGODB_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tenure.fullname" . }}-mongo
                  key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            {{- toYaml .Values.database.bundled.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.database.bundled.persistence.storageClass }}
        storageClassName: {{ .Values.database.bundled.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.bundled.persistence.size | quote }}
{{- end }}