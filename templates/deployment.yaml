apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenure.fullname" . }}
  labels:
    {{- include "tenure.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tenure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenure.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "tenure.validate" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: tenure
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 5757
          env:
            - name: TENURE_MODE
              value: "teams"
            - name: TENURE_HOME
              value: /app/.tenure
            - name: CONFIG_PATH
              value: /app/.tenure/config/bootstrap.toml
            - name: TENURE_DISABLE_JOBS
              value: {{ .Values.disableJobs | quote }}
            - name: PORT
              value: "5757"
            - name: TENURE_USER_ID
              value: {{ .Values.identity.userId | default "team" | quote }}
            {{- if eq .Values.mode "bundled" }}
            - name: MONGODB_URI
              value: "mongodb://tenure:{{ .Values.database.bundled.password | urlquery }}@{{ include "tenure.fullname" . }}-mongo:27017/?directConnection=true&authSource=admin"
            {{- else }}
            - name: MONGODB_URI
              value: {{ required "database.external.uri is required in external mode" .Values.database.external.uri | quote }}
            {{- end }}
            - name: TENURE_MONGODB_DB
              value: "tenure"
            {{- if .Values.database.external.tls.enabled }}
            - name: MONGODB_TLS_CA_FILE
              value: /mnt/mongodb-tls/ca.crt
            {{- end }}
            {{- if .Values.observability.otlpEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: tenure
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint }}
            {{- end }}
            - name: TENURE_MASTER_KEY_PATH
              value: /mnt/secrets/master.key
            - name: TENURE_BELIEF_KEY_PATH
              value: /mnt/secrets/belief.key
            - name: TENURE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ include "tenure.fullname" . }}{{ end }}
                  key: api-token
            - name: TENURE_BACKUP_EXPORTS_ENABLED
              value: {{ .Values.backup.exportsEnabled | quote }}
            - name: TENURE_BACKUP_IMPORTS_ENABLED
              value: {{ .Values.backup.importsEnabled | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/.tenure
            - name: secrets
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.database.external.tls.enabled }}
            - name: mongodb-ca
              mountPath: /mnt/mongodb-tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: secrets
          secret:
            secretName: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ include "tenure.fullname" . }}{{ end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.database.external.tls.enabled }}
        - name: mongodb-ca
          secret:
            secretName: {{ .Values.database.external.tls.caCertSecret }}
        {{- end }}