apiVersion: v1
kind: Service
metadata:
  name: {{ include "tenure.fullname" . }}
  labels:
    {{- include "tenure.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tenure.selectorLabels" . | nindent 4 }}
---
{{- if and (eq .Values.mode "bundled") .Values.database.bundled.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tenure.fullname" . }}-mongo
  labels:
    {{- include "tenure.selectorLabels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: mongo
    {{- include "tenure.selectorLabels" . | nindent 4 }}
  ports:
    - port: 27017
      targetPort: 27017
{{- end }}