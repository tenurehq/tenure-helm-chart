{{- if and (eq .Values.mode "bundled") (not .Values.secrets.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tenure.fullname" . }}
type: Opaque
stringData:
  # NOTE: these are regenerated on every helm template render if left empty.
  # For a stable deployment, capture these after install and pass them
  # explicitly via --set on upgrades, or set secrets.existingSecret.
  api-token: {{ .Values.secrets.apiToken | default (randAlphaNum 32) | quote }}
  master-key: {{ .Values.secrets.masterKey | default (randAlphaNum 32) | quote }}
  belief-key: {{ .Values.secrets.beliefKey | default (randAlphaNum 96) | quote }}
{{- end }}
{{- if eq .Values.mode "bundled" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tenure.fullname" . }}-mongo
type: Opaque
stringData:
  password: {{ .Values.database.bundled.password | default (randAlphaNum 32) | quote }}
{{- end }}
{{- if and (eq .Values.mode "external") (not .Values.secrets.existingSecret) }}
{{- fail "external mode requires secrets.existingSecret to be set" }}
{{- end }}